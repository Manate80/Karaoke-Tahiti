<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaoké Tahiti Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0A0D10;color:#E8EDEF;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.logo{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:#21D9C4;text-transform:uppercase;margin-bottom:12px;}
h1{font-size:clamp(28px,6vw,48px);font-weight:700;letter-spacing:-.02em;text-align:center;margin-bottom:8px;}
.sub{color:#8694A0;font-size:14px;text-align:center;margin-bottom:40px;}
.strings{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px;margin-bottom:40px;}
.string-row{display:flex;align-items:center;gap:10px;}
.sl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#4B5862;width:14px;}
.line{flex:1;border-radius:2px;background:#232E38;}
.string-row:nth-child(1) .line{height:3px;}
.string-row:nth-child(2) .line{height:2.5px;}
.string-row:nth-child(3) .line{height:2px;}
.string-row:nth-child(4) .line{height:1.5px;}
.btn-main{
  display:block;width:100%;max-width:320px;
  background:#21D9C4;color:#06201C;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;
  padding:20px;border-radius:12px;border:none;cursor:pointer;
  text-align:center;text-decoration:none;
  box-shadow:0 0 30px rgba(33,217,196,.3);
  transition:background .15s,transform .1s;
}
.btn-main:active{transform:scale(.97);}
.btn-main:hover{background:#3CE9D4;}
.version{margin-top:20px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#4B5862;}
</style>
</head>
<body>
<div class="logo">Karaoké Tahiti Studio</div>
<h1>Studio</h1>
<p class="sub">Clipper · Mixeur · Basse synchronisée</p>
<div class="strings">
  <div class="string-row"><span class="sl">G</span><div class="line"></div></div>
  <div class="string-row"><span class="sl">C</span><div class="line"></div></div>
  <div class="string-row"><span class="sl">E</span><div class="line"></div></div>
  <div class="string-row"><span class="sl">A</span><div class="line"></div></div>
</div>
<a href="karaoke-tahiti-studio.html" class="btn-main">🎬 Ouvrir le Studio</a>
<p class="version">v1.0 · Étapes 1-2-3-4</p>
</body>
</html>
